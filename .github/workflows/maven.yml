# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Update DB_HOST in application.properties to database service name in docker-compose (postgres)
      run: sed -i 's/ ${DB_HOST} /postgres/' src/main/resources/application.properties

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: rename .example.env to .env
      run: mv .exemple.env .env

    - name : build docker image
      run: docker build -t wdorian/sporthive-app-26 .

    - name: log in Docker hub
      uses: docker/login-action@v4
      with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push to Docker Hub
      run: docker push wdorian/sporthive-app-26:latest
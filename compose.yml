version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - project-net

  backend:
    build: ./backend
    container_name: backend
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DDL_AUTO: ${DDL_AUTO}
      SQL_FILE: ${SQL_FILE}
      SQL_INIT_MODE: ${SQL_INIT_MODE}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    restart: always
    networks:
      - project-net

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "4200:80"
    restart: always
    depends_on:
      - backend
    networks:
      - project-net

volumes:
  postgres_data:

networks:
  project-net:
